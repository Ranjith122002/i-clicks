<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — I-Clicks</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111; --surface2: #1a1a1a;
      --border: #2a2a2a; --text: #f0f0f0; --muted: #888;
      --accent: #fff; --radius: 12px;
      --font: 'Inter', -apple-system, sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
    }
    .logo {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -1px;
      color: #fff;
      margin-bottom: 8px;
    }
    .logo span { color: #888; font-weight: 300; }
    .sub {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 32px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }
    .field { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 44px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 14px;
      color: var(--text);
      font-size: 14px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #555; }
    input::placeholder { color: #555; }
    .btn {
      width: 100%;
      height: 44px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 8px;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      background: #3a1a1a;
      border: 1px solid #5c2a2a;
      color: #cf6f6f;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .back-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
    }
    .back-link a { color: var(--muted); text-decoration: underline; }
    .back-link a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo">I<span>-</span>Clicks</div>
    <p class="sub">Admin Dashboard</p>

    <div class="card">
      <div class="error-msg" id="error-msg"></div>

      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="admin@iclicks.com" autocomplete="email" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn" id="login-btn" onclick="handleLogin()">Sign in</button>
    </div>

    <div class="back-link">
      <a href="/">← Back to gallery</a>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('admin_token')) {
      window.location.href = '/admin/dashboard.html';
    }

    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('error-msg');

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errEl.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success) {
          localStorage.setItem('admin_token', data.token);
          localStorage.setItem('admin_info', JSON.stringify(data.admin));
          window.location.href = '/admin/dashboard.html';
        } else {
          showError(data.message || 'Invalid credentials.');
        }
      } catch (e) {
        showError('Server error. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
