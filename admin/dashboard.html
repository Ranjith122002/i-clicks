<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — I-Clicks Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">I<span>-</span>Clicks</div>
    <nav class="sidebar-nav">
      <a href="/admin/dashboard.html" class="nav-item active">
        <span class="nav-icon">▦</span> Dashboard
      </a>
      <a href="/admin/upload.html" class="nav-item">
        <span class="nav-icon">↑</span> Upload Photo
      </a>
      <a href="/admin/photos.html" class="nav-item">
        <span class="nav-icon">◫</span> All Photos
      </a>
      <a href="/admin/categories.html" class="nav-item">
        <span class="nav-icon">≡</span> Categories
      </a>
      <div class="nav-divider"></div>
      <a href="/" class="nav-item" target="_blank">
        <span class="nav-icon">↗</span> View Site
      </a>
      <button class="nav-item nav-logout" onclick="logout()">
        <span class="nav-icon">⎋</span> Logout
      </button>
    </nav>
  </aside>

  <!-- Main -->
  <div class="main-wrap">
    <header class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <h1 class="page-title">Dashboard</h1>
      <div class="topbar-right">
        <span class="admin-name" id="admin-name">Admin</span>
      </div>
    </header>

    <main class="main-content">

      <!-- Stats Row -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Photos</div>
          <div class="stat-value" id="stat-total">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Published</div>
          <div class="stat-value" id="stat-published">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Drafts</div>
          <div class="stat-value" id="stat-drafts">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Featured</div>
          <div class="stat-value" id="stat-featured">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Categories</div>
          <div class="stat-value" id="stat-categories">—</div>
        </div>
      </div>

      <!-- Quick actions -->
      <div class="section-header">
        <h2 class="section-title">Quick Actions</h2>
      </div>
      <div class="actions-grid">
        <a href="/admin/upload.html" class="action-card primary">
          <div class="action-icon">↑</div>
          <div class="action-label">Upload New Photo</div>
        </a>
        <a href="/admin/photos.html" class="action-card">
          <div class="action-icon">◫</div>
          <div class="action-label">Manage Photos</div>
        </a>
        <a href="/admin/categories.html" class="action-card">
          <div class="action-icon">≡</div>
          <div class="action-label">Manage Categories</div>
        </a>
        <a href="/" target="_blank" class="action-card">
          <div class="action-icon">↗</div>
          <div class="action-label">View Live Site</div>
        </a>
      </div>

      <!-- Recent Photos -->
      <div class="section-header" style="margin-top:32px;">
        <h2 class="section-title">Recent Uploads</h2>
        <a href="/admin/photos.html" class="section-link">View all →</a>
      </div>
      <div class="recent-grid" id="recent-grid">
        <div class="loading-row">Loading…</div>
      </div>

    </main>
  </div>

  <script src="/admin/js/admin.js"></script>
  <script>
    requireAuth();

    async function loadDashboard() {
      try {
        const token = getToken();
        const res = await fetch('/api/admin/stats', {
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();
        if (!data.success) return;

        document.getElementById('stat-total').textContent = data.stats.total;
        document.getElementById('stat-published').textContent = data.stats.published;
        document.getElementById('stat-drafts').textContent = data.stats.unpublished;
        document.getElementById('stat-featured').textContent = data.stats.featured;
        document.getElementById('stat-categories').textContent = data.stats.categories;

        const grid = document.getElementById('recent-grid');
        if (!data.recentPhotos || data.recentPhotos.length === 0) {
          grid.innerHTML = '<div class="empty-row">No photos yet. <a href="/admin/upload.html">Upload one →</a></div>';
          return;
        }

        grid.innerHTML = data.recentPhotos.map(p => `
          <div class="recent-item">
            <div class="recent-thumb">
              ${p.thumbnailUrl ? `<img src="${p.thumbnailUrl}" alt="${escHtml(p.title)}" />` : '<div class="thumb-placeholder">📷</div>'}
            </div>
            <div class="recent-info">
              <div class="recent-title">${escHtml(p.title)}</div>
              <div class="recent-meta">${new Date(p.createdAt).toLocaleDateString()} · ${p.views || 0} views</div>
            </div>
            <div class="recent-status ${p.isPublished ? 'status-published' : 'status-draft'}">
              ${p.isPublished ? 'Published' : 'Draft'}
            </div>
          </div>
        `).join('');
      } catch (e) {
        console.error(e);
      }
    }

    function escHtml(s) {
      return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    loadDashboard();
  </script>
</body>
</html>
