<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Photo — I-Clicks Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">I<span>-</span>Clicks</div>
    <nav class="sidebar-nav">
      <a href="/admin/dashboard.html" class="nav-item"><span class="nav-icon">▦</span> Dashboard</a>
      <a href="/admin/upload.html" class="nav-item active"><span class="nav-icon">↑</span> Upload Photo</a>
      <a href="/admin/photos.html" class="nav-item"><span class="nav-icon">◫</span> All Photos</a>
      <a href="/admin/categories.html" class="nav-item"><span class="nav-icon">≡</span> Categories</a>
      <div class="nav-divider"></div>
      <a href="/" class="nav-item" target="_blank"><span class="nav-icon">↗</span> View Site</a>
      <button class="nav-item nav-logout" onclick="logout()"><span class="nav-icon">⎋</span> Logout</button>
    </nav>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <h1 class="page-title">Upload Photo</h1>
      <div class="topbar-right">
        <span class="admin-name" id="admin-name">Admin</span>
      </div>
    </header>

    <main class="main-content">
      <div class="alert" id="upload-alert"></div>

      <div style="max-width: 700px;">

        <!-- Drop Zone -->
        <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
          <input type="file" id="file-input" accept="image/*,.heic" />
          <div class="upload-icon" id="upload-icon">📷</div>
          <div class="upload-label" id="upload-label">Drop your iPhone photo here</div>
          <div class="upload-sub" id="upload-sub">or click to browse · JPG, PNG, WEBP, HEIC up to 25MB</div>
          <img class="upload-preview" id="upload-preview" style="display:none;" alt="preview" />
        </div>

        <!-- Progress bar -->
        <div id="progress-wrap" style="display:none; margin-top:12px;">
          <div style="height:4px; background:#1e1e1e; border-radius:2px; overflow:hidden;">
            <div id="progress-bar" style="height:100%; background:#fff; width:0%; transition:width 0.3s;"></div>
          </div>
          <div id="progress-label" style="font-size:12px; color:#666; margin-top:4px; text-align:center;">Uploading…</div>
        </div>

        <!-- Form fields -->
        <div style="margin-top:28px;">
          <div class="form-grid">
            <div class="form-group full">
              <label for="title">Title *</label>
              <input type="text" id="title" placeholder="e.g. Golden Hour at Marine Drive" maxlength="150" />
            </div>

            <div class="form-group full">
              <label for="description">Description</label>
              <textarea id="description" placeholder="Add a description…" rows="3" maxlength="500"></textarea>
            </div>

            <div class="form-group">
              <label for="category">Category</label>
              <select id="category">
                <option value="">— Select category —</option>
              </select>
            </div>

            <div class="form-group">
              <label for="tags">Tags (comma-separated)</label>
              <input type="text" id="tags" placeholder="nature, sunset, iphone15" />
            </div>

            <div class="form-group">
              <label for="location">Location</label>
              <input type="text" id="location" placeholder="Mumbai, India" />
            </div>

            <div class="form-group">
              <label for="device">Device</label>
              <input type="text" id="device" value="iPhone" placeholder="iPhone 15 Pro" />
            </div>

            <div class="form-group">
              <label for="shoot-date">Shoot Date</label>
              <input type="date" id="shoot-date" />
            </div>

            <div class="form-group" style="justify-content:flex-end; gap:12px; flex-direction:row; align-items:center;">
              <div class="checkbox-row">
                <input type="checkbox" id="is-featured" />
                <label for="is-featured">Featured</label>
              </div>
              <div class="checkbox-row">
                <input type="checkbox" id="is-published" checked />
                <label for="is-published">Published</label>
              </div>
            </div>
          </div>

          <div style="margin-top:24px; display:flex; gap:12px;">
            <button class="btn btn-primary" id="upload-btn" onclick="submitUpload()">↑ Upload Photo</button>
            <button class="btn btn-secondary" onclick="resetForm()">Reset</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/admin/js/admin.js"></script>
  <script>
    requireAuth();

    const fileInput = document.getElementById('file-input');
    const zone = document.getElementById('upload-zone');
    let selectedFile = null;

    // Drag and drop
    zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) handleFileSelect(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) handleFileSelect(fileInput.files[0]);
    });

    function handleFileSelect(file) {
      selectedFile = file;
      const preview = document.getElementById('upload-preview');
      const reader = new FileReader();
      reader.onload = (e) => {
        preview.src = e.target.result;
        preview.style.display = 'block';
        document.getElementById('upload-icon').style.display = 'none';
        document.getElementById('upload-label').textContent = file.name;
        document.getElementById('upload-sub').textContent = (file.size / 1024 / 1024).toFixed(1) + ' MB';
      };
      reader.readAsDataURL(file);
    }

    async function loadCategories() {
      try {
        const res = await fetch('/api/categories');
        const data = await res.json();
        const sel = document.getElementById('category');
        (data.categories || []).forEach(cat => {
          sel.innerHTML += `<option value="${cat._id}">${escHtml(cat.name)}</option>`;
        });
      } catch (e) {}
    }

    async function submitUpload() {
      if (!selectedFile) { showAlert('upload-alert', 'Please select a photo first.', 'error'); return; }
      const title = document.getElementById('title').value.trim();
      if (!title) { showAlert('upload-alert', 'Title is required.', 'error'); return; }

      const btn = document.getElementById('upload-btn');
      btn.disabled = true;
      btn.textContent = 'Uploading…';

      const formData = new FormData();
      formData.append('photo', selectedFile);
      formData.append('title', title);
      formData.append('description', document.getElementById('description').value);
      formData.append('category', document.getElementById('category').value);
      formData.append('tags', document.getElementById('tags').value);
      formData.append('location', document.getElementById('location').value);
      formData.append('device', document.getElementById('device').value || 'iPhone');
      formData.append('shootDate', document.getElementById('shoot-date').value);
      formData.append('isFeatured', document.getElementById('is-featured').checked);
      formData.append('isPublished', document.getElementById('is-published').checked);

      document.getElementById('progress-wrap').style.display = 'block';

      try {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/photos');
        xhr.setRequestHeader('Authorization', `Bearer ${getToken()}`);

        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            const pct = Math.round(e.loaded / e.total * 100);
            document.getElementById('progress-bar').style.width = pct + '%';
            document.getElementById('progress-label').textContent = `Uploading… ${pct}%`;
          }
        };

        xhr.onload = () => {
          const data = JSON.parse(xhr.responseText);
          document.getElementById('progress-wrap').style.display = 'none';
          if (data.success) {
            showAlert('upload-alert', '✓ Photo uploaded successfully!', 'success');
            resetForm();
          } else {
            showAlert('upload-alert', data.message || 'Upload failed.', 'error');
          }
          btn.disabled = false;
          btn.textContent = '↑ Upload Photo';
        };

        xhr.onerror = () => {
          showAlert('upload-alert', 'Network error. Please try again.', 'error');
          btn.disabled = false;
          btn.textContent = '↑ Upload Photo';
        };

        xhr.send(formData);
      } catch (e) {
        showAlert('upload-alert', e.message, 'error');
        btn.disabled = false;
        btn.textContent = '↑ Upload Photo';
      }
    }

    function resetForm() {
      selectedFile = null;
      fileInput.value = '';
      document.getElementById('upload-preview').style.display = 'none';
      document.getElementById('upload-icon').style.display = 'block';
      document.getElementById('upload-label').textContent = 'Drop your iPhone photo here';
      document.getElementById('upload-sub').textContent = 'or click to browse · JPG, PNG, WEBP, HEIC up to 25MB';
      document.getElementById('title').value = '';
      document.getElementById('description').value = '';
      document.getElementById('tags').value = '';
      document.getElementById('location').value = '';
      document.getElementById('shoot-date').value = '';
      document.getElementById('is-featured').checked = false;
      document.getElementById('is-published').checked = true;
      document.getElementById('progress-bar').style.width = '0%';
    }

    loadCategories();
  </script>
</body>
</html>
