    .btn-signup:hover{background:var(--red2);border-color:var(--red2)}

    /* BREADCRUMB */
    .bc{padding:12px 24px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border)}

    .bc-sep{color:var(--border2);font-size:16px}

    /* PAGE HEADER */

    /* RELATED TAGS */

    /* SEO SECTION */
    .seo-sec{padding:40px 24px;border-top:1px solid var(--border);background:var(--bg2);margin-top:20px}

    /* LOAD MORE */
    .load-wrap{display:flex;justify-content:center;padding:32px}
    .load-btn{padding:13px 36px;border-radius:24px;background:#fff;border:2px solid var(--border2);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:var(--font)}
    .load-btn:hover{border-color:var(--text)}

    /* TOAST */
    .toast-wrap{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
    .toast{padding:12px 18px;border-radius:10px;font-size:14px;font-weight:500;background:var(--text);color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.15);animation:toastIn 0.3s ease}
    .toast.ok{background:#0a7c59}
    @keyframes toastIn{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}

    /* FOOTER */
    .footer{border-top:1px solid var(--border);padding:32px 24px;background:var(--bg2)}

</head>

const ALL_KW=Object.keys(SEO);

// ── STATE ──
const S={photos:[],page:1,hasMore:true,loading:false,keyword:'',lbIdx:-1,likes:new Set(),saves:new Set()};

// ── GET KEYWORD FROM URL ──
function getKw(){
  // URL pattern: /ideas/sunset  or  /ideas/nature-photography
  const path=window.location.pathname;
  const match=path.match(/\/ideas\/(.+)/);
  if(match) return decodeURIComponent(match[1]).toLowerCase().replace(/-/g,' ');
  const q=new URLSearchParams(window.location.search).get('q')||'';
  return q.toLowerCase();
}

// ── INIT ──
document.addEventListener('DOMContentLoaded',()=>{
  const kw=getKw();
  S.keyword=kw;
  // Set search box placeholder to current keyword
  document.getElementById('si2').value=kw;
  setupPageSEO(kw);
  loadPhotos(true);
  setupLB();
  setupScroll();
});

// ── SEO SETUP ──
function setupPageSEO(kw){
  const key=kw.replace(/\s+/g,'-').toLowerCase();
  const data=SEO[key]||SEO[kw]||null;
  const cap=kw?kw.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' '):'iPhone Photography';
  const BASE='https://i-clicks.com';

  if(data){
    document.getElementById('pt').textContent=data.title;
    document.getElementById('pd').content=data.desc;
    document.getElementById('pk').content=data.kw;
    document.getElementById('ogt').content=data.title;
    document.getElementById('ogd').content=data.desc;
    document.getElementById('can').href=`${BASE}/ideas/${key}`;
    document.getElementById('ph1').textContent=data.h1;
    document.getElementById('pdesc').textContent=data.pdesc;
    document.getElementById('bc-cur').textContent=cap;
    document.getElementById('seo-h2').textContent=data.seoH2;
    document.getElementById('seo-p1').textContent=data.seoP1;
    document.getElementById('seo-h3').textContent=data.seoH3;
    document.getElementById('seo-p2').textContent=data.seoP2;

    // Related tags
    const r=document.getElementById('rel-wrap');
    r.innerHTML='<span class="rel-label">Related:</span>';
    data.related.forEach(t=>{r.innerHTML+=`<a href="/ideas/${t}" class="rel-tag">${t}</a>`;});

    // SEO links
    const sl=document.getElementById('seo-links');
    sl.innerHTML='<span style="font-size:13px;color:#999;margin-right:4px">More categories:</span>';
    ALL_KW.filter(k=>k!==key).forEach(k=>{sl.innerHTML+=`<a href="/ideas/${k}" class="seo-link">${k.charAt(0).toUpperCase()+k.slice(1)} Photography</a>`;});

    // JSON-LD
    document.getElementById('schema').textContent=JSON.stringify({"@context":"https://schema.org","@type":"CollectionPage","name":data.h1,"description":data.desc,"url":`${BASE}/ideas/${key}`,"isPartOf":{"@type":"WebSite","name":"I-Clicks","url":BASE}});
  } else {
    // Generic keyword not in SEO map — still works, just generic meta
    document.getElementById('pt').textContent=`${cap} iPhone Photos — Free HD | I-Clicks`;
    document.getElementById('pd').content=`Free HD ${cap} photos shot on iPhone. Browse and download.`;
    document.getElementById('ph1').textContent=`${cap} Photos`;
    document.getElementById('pdesc').textContent=`Browse free HD ${cap.toLowerCase()} photos shot on iPhone. Download and use for free.`;
    document.getElementById('bc-cur').textContent=cap;
    document.getElementById('can').href=`${BASE}/ideas/${kw.replace(/\s+/g,'-')}`;
    document.getElementById('seo-h2').textContent=`${cap} iPhone Photography`;
    document.getElementById('seo-p1').textContent=`Discover stunning ${cap.toLowerCase()} photos captured on iPhone. All photos are free to download and use.`;
    document.getElementById('seo-h3').textContent='Browse more categories';
    document.getElementById('seo-p2').textContent='I-Clicks features thousands of photos across nature, portrait, street, sunset, macro, travel, and architecture categories.';
    const sl=document.getElementById('seo-links');
    sl.innerHTML='<span style="font-size:13px;color:#999;margin-right:4px">Browse:</span>';
    ALL_KW.forEach(k=>{sl.innerHTML+=`<a href="/ideas/${k}" class="seo-link">${k.charAt(0).toUpperCase()+k.slice(1)}</a>`;});

    const r=document.getElementById('rel-wrap');
    r.innerHTML='<span class="rel-label">Browse categories:</span>';
    ALL_KW.slice(0,6).forEach(t=>{r.innerHTML+=`<a href="/ideas/${t}" class="rel-tag">${t}</a>`;});
  }
}

// ── LOAD PHOTOS ──
async function loadPhotos(reset=false){
  if(S.loading||(!S.hasMore&&!reset))return;
  if(reset){S.page=1;S.photos=[];S.hasMore=true;document.getElementById('gg').innerHTML=skels(15);}
  S.loading=true;
  try{
    let url=`/api/photos?page=${S.page}&limit=20`;
    if(S.keyword) url+=`&search=${encodeURIComponent(S.keyword)}`;
    const d=await(await fetch(url)).json();
    if(!d.success)throw new Error();
    S.photos=reset?d.photos:[...S.photos,...d.photos];
    S.hasMore=d.pagination.hasMore;S.page++;
    document.getElementById('pcnt').textContent=d.pagination.total||S.photos.length;
    renderGrid(d.photos,reset);
  }catch(e){
    document.getElementById('gg').innerHTML=`<div class="empty"><div class="empty-icon"><svg width="28" height="28" fill="none" stroke="#bbb" viewBox="0 0 24 24" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div><h3>No photos found</h3><p>No photos for "${esc(S.keyword)}" yet. <a href="/" style="color:var(--red)">Browse all photos →</a></p></div>`;
  }finally{
    S.loading=false;
    document.getElementById('lbtn').style.display=S.hasMore?'block':'none';
  }
}

// ── RENDER ──
function renderGrid(photos,reset){
  const g=document.getElementById('gg');
  if(reset)g.innerHTML='';
  photos.forEach((p,i)=>{
    const idx=reset?i:S.photos.length-photos.length+i;
    const ar=(p.height&&p.width)?(p.height/p.width*100).toFixed(1):100;
    const card=document.createElement('div');
    card.className='photo-card';
    card.style.animationDelay=(i*.04)+'s';
    card.innerHTML=`
      ${p.isFeatured?'<div class="card-feat">Featured</div>':''}
      <div style="padding-top:${ar}%;position:relative;overflow:hidden">
        <img src="${p.thumbnailUrl||p.url}" alt="${esc(p.title)} — ${esc(S.keyword)} iPhone Photo" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" loading="lazy"/>
      </div>
      <div class="card-overlay"></div>
      <div class="card-top">
        <button class="card-save" onclick="cSave(event,'${p._id}',this)">Save</button>
        <button class="card-like" onclick="cLike(event,'${p._id}',this)">
          <svg width="14" height="14" fill="none" stroke="#e74c4c" viewBox="0 0 24 24" stroke-width="2.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
      </div>
      <div class="card-bottom">
        <div class="card-title">${esc(p.title)}</div>
        ${p.category?`<div class="card-cat">${esc(p.category.name)}</div>`:''}
      </div>
      <button class="card-dl" onclick="dl(event,'${p.url}','${esc(p.title)}')" title="Download">
        <svg width="14" height="14" fill="none" stroke="#111" viewBox="0 0 24 24" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>`;
    card.addEventListener('click',()=>openLB(idx));
    g.appendChild(card);
  });
}

function skels(n){const h=[220,280,240,190,260,210,200,270,235,215,260,230,250,200,240];return Array.from({length:n},(_,i)=>`<div class="photo-skeleton" style="height:${h[i%15]}px;animation-delay:${i*.06}s"></div>`).join('');}

// ── CARD ACTIONS ──
function cSave(e,id,btn){e.stopPropagation();if(S.saves.has(id)){S.saves.delete(id);btn.className='card-save';btn.textContent='Save';toast('Removed');}else{S.saves.add(id);btn.className='card-save saved';btn.textContent='Saved ✓';toast('🔖 Saved!','ok');}}
function cLike(e,id,btn){e.stopPropagation();if(S.likes.has(id)){S.likes.delete(id);btn.classList.remove('liked');btn.querySelector('svg').setAttribute('fill','none');}else{S.likes.add(id);btn.classList.add('liked');btn.querySelector('svg').setAttribute('fill','#e74c4c');toast('❤️ Liked!','ok');}}

// ── LIGHTBOX ──
function setupLB(){
  document.getElementById('lb').addEventListener('click',e=>{if(e.target===e.currentTarget)closeLB();});
  document.addEventListener('keydown',e=>{
    if(!document.getElementById('lb').classList.contains('open'))return;
    if(e.key==='Escape')closeLB();
    if(e.key==='ArrowLeft')navLB(-1);
    if(e.key==='ArrowRight')navLB(1);
  });
}
function openLB(idx){
  S.lbIdx=idx;const p=S.photos[idx];if(!p)return;
  document.getElementById('lb-img').src=p.url;
  document.getElementById('lb-title').textContent=p.title;
  document.getElementById('lb-desc').textContent=p.description||'';
  document.getElementById('lb-tags').innerHTML=(p.tags||[]).map(t=>`<span class="tag-pill" onclick="window.location.href='/ideas/${esc(t)}'">#${esc(t)}</span>`).join('');
  document.getElementById('lb-meta').innerHTML=`
    ${p.width?`<div class="lb-row"><span class="lb-lbl">Resolution</span><span class="lb-val">${p.width}×${p.height}px</span></div>`:''}
    ${p.device?`<div class="lb-row"><span class="lb-lbl">Device</span><span class="lb-val">${esc(p.device)}</span></div>`:''}
    ${p.location?`<div class="lb-row"><span class="lb-lbl">Location</span><span class="lb-val">${esc(p.location)}</span></div>`:''}
    <div class="lb-row"><span class="lb-lbl">Views</span><span class="lb-val">${(p.views||0).toLocaleString()}</span></div>`;
  document.getElementById('lb-like').className='lb-btn lb-like'+(S.likes.has(p._id)?' liked':'');
  document.getElementById('lb-save').textContent=S.saves.has(p._id)?'✓ Saved':'🔖 Save';
  document.getElementById('lb-dl').onclick=()=>dl(null,p.url,p.title);
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLB(){document.getElementById('lb').classList.remove('open');document.body.style.overflow='';}
function navLB(d){const n=S.lbIdx+d;if(n>=0&&n<S.photos.length)openLB(n);if(d===1&&n>=S.photos.length-4)loadPhotos();}
function toggleLike(){const p=S.photos[S.lbIdx];if(!p)return;const btn=document.getElementById('lb-like');if(S.likes.has(p._id)){S.likes.delete(p._id);btn.classList.remove('liked');}else{S.likes.add(p._id);btn.classList.add('liked');toast('❤️ Liked!','ok');}}
function toggleSave(){const p=S.photos[S.lbIdx];if(!p)return;if(S.saves.has(p._id)){S.saves.delete(p._id);document.getElementById('lb-save').textContent='🔖 Save';}else{S.saves.add(p._id);document.getElementById('lb-save').textContent='✓ Saved';toast('🔖 Saved!','ok');}}

// ── SCROLL ──
function setupScroll(){new IntersectionObserver(e=>{if(e[0].isIntersecting&&S.hasMore&&!S.loading)loadPhotos();},{rootMargin:'600px'}).observe(document.getElementById('sentinel'));}

// ── UTILS ──
function dl(e,url,title){if(e)e.stopPropagation();const a=document.createElement('a');a.href=url;a.download=(title||'photo').replace(/\s+/g,'-').toLowerCase()+'.jpg';document.body.appendChild(a);a.click();a.remove();}
function toast(msg,type=''){const wrap=document.getElementById('tw');const t=document.createElement('div');t.className='toast '+(type||'');t.textContent=msg;wrap.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},2500);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
